<!DOCTYPE html>
<html>

<head>
    <title>Payment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Payment Details 💳</h1>

    <div class="payment-box">

    <script src="payment.js"></script>

</html>
